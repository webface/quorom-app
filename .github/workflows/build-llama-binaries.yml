name: Build llama.cpp RPC Binaries

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp release tag (e.g. b3800)'
        required: true
        default: 'b3800'

permissions:
  contents: write

jobs:
  build-windows-cuda:
    runs-on: windows-2022
    steps:
      - name: Checkout llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git checkout ${{ inputs.llama_version }}

      - name: Build with CUDA + RPC
        shell: cmd
        env:
          CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.4"
        run: |
          cd llama.cpp
          cmake -B build -G "Visual Studio 17 2022" -A x64 ^
            -DLLAMA_RPC=ON ^
            -DGGML_CUDA=ON ^
            -DGGML_NATIVE=ON ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCUDA_TOOLKIT_ROOT_DIR="C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
          cmake --build build --config Release -j -- -m

      - name: Package Windows binaries
        shell: pwsh
        run: |
          $binDir = "llama.cpp\build\bin\Release"
          $dest = "llama-cpp-rpc-win-x64"
          New-Item -ItemType Directory -Path $dest -Force
          
          # Copy server binaries
          foreach ($f in @("llama-server.exe", "rpc-server.exe")) {
            $src = Join-Path $binDir $f
            if (Test-Path $src) { 
              Copy-Item $src -Destination $dest
            }
          }
          
          # Copy all DLLs (includes ggml CUDA DLLs)
          Get-ChildItem "$binDir\*.dll" | ForEach-Object { Copy-Item $_.FullName -Destination $dest }
          
          # Copy CUDA runtime DLLs
          $cudaBin = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin"
          $cudaDLLs = @("cudart64_12.dll", "cublas64_12.dll", "cublasLt64_12.dll")
          foreach ($dll in $cudaDLLs) {
            $src = Join-Path $cudaBin $dll
            if (Test-Path $src) { Copy-Item $src -Destination $dest }
          }
          
          Compress-Archive -Path "$dest\*" -DestinationPath "llama-cpp-rpc-win-x64.zip" -Force
          Write-Host "=== Contents ==="
          Get-ChildItem $dest | Format-Table Name, Length

      - name: Upload to binaries release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-win-x64.zip --repo ${{ github.repository }} --clobber

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git checkout ${{ inputs.llama_version }}

      - name: Build with Metal + RPC
        run: |
          cd llama.cpp
          cmake -B build \
            -DLLAMA_RPC=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build -j

      - name: Package macOS binaries
        run: |
          DEST="llama-cpp-rpc-macos-arm64"
          mkdir -p "$DEST"
          cp llama.cpp/build/bin/llama-server "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/rpc-server "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/libggml*.dylib "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/libllama*.dylib "$DEST/" 2>/dev/null || true
          find llama.cpp/build -name "default.metallib" -exec cp {} "$DEST/" \; 2>/dev/null || true
          zip -r llama-cpp-rpc-macos-arm64.zip "$DEST/"

      - name: Upload to binaries release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-macos-arm64.zip --repo ${{ github.repository }} --clobber
