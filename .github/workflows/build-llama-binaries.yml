name: Build llama.cpp RPC Binaries

on:
  workflow_dispatch:
    inputs:
      llama_ref:
        description: 'llama.cpp ref (tag like b3800, or "default" for latest)'
        required: true
        default: 'default'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout llama.cpp
        shell: pwsh
        run: |
          $ref = '${{ inputs.llama_ref }}'
          if ($ref -eq 'default') {
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          } else {
            git clone --depth 1 --branch $ref https://github.com/ggerganov/llama.cpp.git
          }

      - name: Find CUDA
        shell: pwsh
        run: |
          $cuda = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
          if ($cuda) {
            $cudaPath = $cuda.FullName
            echo "CUDA found at: $cudaPath"
            echo "CUDAToolkit_ROOT=$cudaPath" >> $env:GITHUB_ENV
            echo "$cudaPath\bin" >> $env:GITHUB_PATH
          } else {
            echo "CUDA not found — building CPU-only"
          }

      - name: Build with CUDA + RPC
        shell: cmd
        run: |
          cd llama.cpp
          if defined CUDAToolkit_ROOT (
            echo Building with CUDA at %CUDAToolkit_ROOT%
            cmake -B build -G "Visual Studio 17 2022" -A x64 ^
              -DGGML_RPC=ON ^
              -DGGML_CUDA=ON ^
              -DGGML_NATIVE=ON ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCUDAToolkit_ROOT="%CUDAToolkit_ROOT%"
          ) else (
            echo Building CPU-only
            cmake -B build -G "Visual Studio 17 2022" -A x64 ^
              -DGGML_RPC=ON ^
              -DGGML_NATIVE=ON ^
              -DCMAKE_BUILD_TYPE=Release
          )
          cmake --build build --config Release -j -- -m

      - name: Package Windows binaries
        shell: pwsh
        run: |
          $binDir = "llama.cpp\build\bin\Release"
          $dest = "llama-cpp-rpc-win-x64"
          New-Item -ItemType Directory -Path $dest -Force
          
          foreach ($f in @("llama-server.exe", "rpc-server.exe")) {
            $src = Join-Path $binDir $f
            if (Test-Path $src) { Copy-Item $src -Destination $dest }
          }
          
          Get-ChildItem "$binDir\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName -Destination $dest
          }
          
          # Copy CUDA runtime DLLs
          $cudaDirs = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" -ErrorAction SilentlyContinue
          if ($cudaDirs) {
            $cudaBin = Join-Path ($cudaDirs | Sort-Object Name -Descending | Select-Object -First 1).FullName "bin"
            foreach ($dll in @("cudart64_*.dll", "cublas64_*.dll", "cublasLt64_*.dll")) {
              Get-ChildItem (Join-Path $cudaBin $dll) -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName -Destination $dest
              }
            }
          }
          
          Compress-Archive -Path "$dest\*" -DestinationPath "llama-cpp-rpc-win-x64.zip" -Force
          Write-Host "=== Package ==="
          Get-ChildItem $dest | Format-Table Name, Length

      - name: Upload to binaries release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-win-x64.zip --repo ${{ github.repository }} --clobber

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout llama.cpp
        run: |
          if [ "${{ inputs.llama_ref }}" = "default" ]; then
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          else
            git clone --depth 1 --branch ${{ inputs.llama_ref }} https://github.com/ggerganov/llama.cpp.git
          fi

      - name: Build with Metal + RPC
        run: |
          cd llama.cpp
          cmake -B build \
            -DGGML_RPC=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build -j

      - name: Package macOS binaries
        run: |
          DEST="llama-cpp-rpc-macos-arm64"
          mkdir -p "$DEST"
          cp llama.cpp/build/bin/llama-server "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/rpc-server "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/libggml*.dylib "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/libllama*.dylib "$DEST/" 2>/dev/null || true
          find llama.cpp/build -name "default.metallib" -exec cp {} "$DEST/" \; 2>/dev/null || true
          zip -r llama-cpp-rpc-macos-arm64.zip "$DEST/"

      - name: Upload to binaries release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-macos-arm64.zip --repo ${{ github.repository }} --clobber
