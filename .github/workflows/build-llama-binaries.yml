name: Build llama.cpp RPC Binaries

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp release tag (e.g. b3800)'
        required: true
        default: 'b3800'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git checkout ${{ inputs.llama_version }}

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.4.0'

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          version: 1.3.283.0

      - name: Build with CUDA + Vulkan + RPC
        shell: cmd
        run: |
          cd llama.cpp
          cmake -B build -G "Visual Studio 17 2022" -A x64 ^
            -DLLAMA_RPC=ON ^
            -DGGML_CUDA=ON ^
            -DGGML_VULKAN=ON ^
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j

      - name: Package Windows binaries
        shell: pwsh
        run: |
          $binDir = "llama.cpp\build\bin\Release"
          $files = @(
            "llama-server.exe",
            "rpc-server.exe"
          )
          
          # Include required DLLs
          $dlls = @(
            "ggml.dll",
            "ggml-base.dll",
            "ggml-cuda.dll",
            "ggml-vulkan.dll",
            "ggml-cpu.dll"
          )
          
          $dest = "llama-cpp-rpc-win-x64"
          New-Item -ItemType Directory -Path $dest -Force
          
          foreach ($f in $files) {
            $src = Join-Path $binDir $f
            if (Test-Path $src) {
              Copy-Item $src -Destination $dest
              Write-Host "Copied $f"
            } else {
              Write-Host "WARNING: $f not found"
            }
          }
          
          foreach ($dll in $dlls) {
            $src = Join-Path $binDir $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination $dest
            }
          }
          
          # Also copy CUDA runtime DLLs that ggml-cuda depends on
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin"
          $cudaDLLs = @(
            "cudart64_12.dll",
            "cublas64_12.dll",
            "cublasLt64_12.dll"
          )
          foreach ($dll in $cudaDLLs) {
            $src = Join-Path $cudaPath $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination $dest
            }
          }
          
          Compress-Archive -Path "$dest\*" -DestinationPath "llama-cpp-rpc-win-x64.zip" -Force
          Write-Host "Package created: llama-cpp-rpc-win-x64.zip"
          Get-ChildItem $dest | Format-Table Name, Length

      - name: Upload to binaries release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-win-x64.zip --repo ${{ github.repository }} --clobber

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git checkout ${{ inputs.llama_version }}

      - name: Build with Metal + RPC
        run: |
          cd llama.cpp
          cmake -B build \
            -DLLAMA_RPC=ON \
            -DGGML_METAL=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build -j

      - name: Package macOS binaries
        run: |
          DEST="llama-cpp-rpc-macos-arm64"
          mkdir -p "$DEST"
          cp llama.cpp/build/bin/llama-server "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/rpc-server "$DEST/" 2>/dev/null || true
          # Copy dylibs
          cp llama.cpp/build/bin/libggml*.dylib "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/libllama*.dylib "$DEST/" 2>/dev/null || true
          zip -r llama-cpp-rpc-macos-arm64.zip "$DEST/"

      - name: Upload to binaries release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-macos-arm64.zip --repo ${{ github.repository }} --clobber
