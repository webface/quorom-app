name: Build macOS llama.cpp Binary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout llama.cpp
        run: git clone --depth 1 https://github.com/ggerganov/llama.cpp.git

      - name: Build with Metal + RPC
        run: |
          cd llama.cpp
          cmake -B build \
            -DGGML_RPC=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build -j 4 --target llama-server rpc-server

      - name: Verify binaries exist
        run: |
          ls -lh llama.cpp/build/bin/llama-server
          ls -lh llama.cpp/build/bin/rpc-server
          file llama.cpp/build/bin/llama-server

      - name: Package macOS binaries
        run: |
          DEST="llama-cpp-rpc-macos-arm64"
          mkdir -p "$DEST"
          cp llama.cpp/build/bin/llama-server "$DEST/"
          cp llama.cpp/build/bin/rpc-server "$DEST/"
          # Copy shared libraries
          cp llama.cpp/build/bin/libggml*.dylib "$DEST/" 2>/dev/null || true
          cp llama.cpp/build/bin/libllama*.dylib "$DEST/" 2>/dev/null || true
          # Copy Metal kernel cache
          find llama.cpp/build -name "default.metallib" -exec cp {} "$DEST/" \; 2>/dev/null || true
          echo "=== Package contents ==="
          ls -lh "$DEST/"
          echo "=== Total size ==="
          du -sh "$DEST/"
          zip -r llama-cpp-rpc-macos-arm64.zip "$DEST/"
          ls -lh llama-cpp-rpc-macos-arm64.zip

      - name: Upload to binaries release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload binaries llama-cpp-rpc-macos-arm64.zip --repo ${{ github.repository }} --clobber
